<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admin - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <style>/* college uses CSS defaults */</style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-mortarboard me-2"></i>College Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item active"><i class="bi bi-people"></i>Users</div></a>
        <a href="attendance.html"><div class="nav-item"><i class="bi bi-check2-square"></i>Attendance</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="complaints.html"><div class="nav-item"><i class="bi bi-chat-dots"></i>Complaints</div></a>
        <a href="reports.html"><div class="nav-item"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <div><h5 class="fw-bold mb-0">Users Management</h5><small class="text-muted">Students & Faculty</small></div>
            <span class="badge bg-primary px-3 py-2 admin-box">College Admin</span>
        </div>

        <!-- Advanced Filter Bar -->
        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-lg-2 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">Search</label>
                    <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="Name or mobile..." oninput="debounceRender()">
                </div>
                <div class="col-lg-2 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">Role</label>
                    <select id="roleFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Roles</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
                <div class="col-lg-2 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">Bus</label>
                    <select id="busFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Buses</option>
                    </select>
                </div>
                <div class="col-lg-1 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">City</label>
                    <select id="cityFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All</option>
                    </select>
                </div>
                <div class="col-lg-2 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">Branch</label>
                    <select id="branchFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Branches</option>
                    </select>
                </div>
                <div class="col-lg-1 col-md-4 col-6">
                    <label class="form-label small fw-medium mb-1">Year</label>
                    <select id="yearFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="col-lg-1 col-md-3 col-6">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="clearFilters()" title="Clear all filters"><i class="bi bi-x-circle"></i></button>
                </div>
                <div class="col-lg-1 col-md-3 col-6">
                    <span class="badge bg-primary w-100 py-2" id="countLabel">-</span>
                </div>
            </div>
            <!-- Active filter chips -->
            <div id="filterChips" class="mt-2"></div>
        </div>

        <!-- Users Table -->
        <div class="section-box fade-up">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead><tr><th>Name</th><th>Role</th><th>Mobile</th><th>Bus</th><th>City</th><th>Branch</th><th>Year</th><th>Actions</th></tr></thead>
                    <tbody id="usersBody"><tr><td colspan="8" class="text-center py-4"><div class="skeleton-line mb-2" style="width:60%;margin:0 auto"></div><div class="skeleton-line" style="width:40%;margin:0 auto"></div></td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("college")) throw "unauthorized";

        let allUsers = [];
        let _debounceTimer = null;
        const YEAR_LABELS = { "1": "1st Year", "2": "2nd Year", "3": "3rd Year", "4": "4th Year" };

        function debounceRender() { clearTimeout(_debounceTimer); _debounceTimer = setTimeout(renderTable, 200); }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/admin/users-by-institution?institution=college`, { headers: headers() });
                const data = await res.json();
                if (data.success) {
                    // STRICT: college only — students + faculty (NO parents, NO school data)
                    allUsers = [...(data.students || []), ...(data.faculty || [])];
                    populateFilters();
                    renderTable();
                }
            } catch (e) { console.error("Load users error:", e); }
        }

        function populateFilters() {
            // Bus
            const buses = [...new Set(allUsers.map(u => u.busId).filter(Boolean))].sort((a,b) => (parseInt(a.replace(/\D/g,''))||0) - (parseInt(b.replace(/\D/g,''))||0));
            document.getElementById("busFilter").innerHTML = '<option value="all">All Buses</option>' + buses.map(b => `<option value="${b}">${b}</option>`).join("");
            // City
            const cities = [...new Set(allUsers.map(u => u.city).filter(Boolean))].sort();
            document.getElementById("cityFilter").innerHTML = '<option value="all">All</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join("");
            // Branch
            const branches = [...new Set(allUsers.map(u => u.branch).filter(Boolean))].sort();
            document.getElementById("branchFilter").innerHTML = '<option value="all">All Branches</option>' + branches.map(b => `<option value="${b}">${b}</option>`).join("");
        }

        function clearFilters() {
            document.getElementById("searchBox").value = "";
            document.getElementById("roleFilter").value = "all";
            document.getElementById("busFilter").value = "all";
            document.getElementById("cityFilter").value = "all";
            document.getElementById("branchFilter").value = "all";
            document.getElementById("yearFilter").value = "all";
            renderTable();
        }

        function renderTable() {
            const search = document.getElementById("searchBox").value.toLowerCase();
            const role = document.getElementById("roleFilter").value;
            const bus = document.getElementById("busFilter").value;
            const city = document.getElementById("cityFilter").value;
            const branch = document.getElementById("branchFilter").value;
            const year = document.getElementById("yearFilter").value;

            let filtered = allUsers.filter(u => {
                if (search && !(u.name||"").toLowerCase().includes(search) && !(u.mobile||"").includes(search)) return false;
                if (role !== "all" && (u.role||"").toLowerCase() !== role) return false;
                if (bus !== "all" && u.busId !== bus) return false;
                if (city !== "all" && (u.city||"").toLowerCase() !== city.toLowerCase()) return false;
                if (branch !== "all" && u.branch !== branch) return false;
                if (year !== "all" && (u.year||"") !== year) return false;
                return true;
            });

            document.getElementById("countLabel").innerText = filtered.length;
            updateChips();

            if (!filtered.length) {
                document.getElementById("usersBody").innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="bi bi-people"></i><p>No users match your filters</p></div></td></tr>`;
                return;
            }

            document.getElementById("usersBody").innerHTML = filtered.map(u => {
                const yearLabel = YEAR_LABELS[u.year] || u.year || "-";
                const roleBadge = u.role === "faculty"
                    ? '<span class="badge" style="background:#fef3c7;color:#92400e">Faculty</span>'
                    : '<span class="badge" style="background:#dbeafe;color:#1e40af">Student</span>';
                return `<tr>
                    <td class="fw-semibold">${u.name||"-"}</td>
                    <td>${roleBadge}</td>
                    <td class="small">${u.mobile||"-"}</td>
                    <td><span class="badge bg-secondary">${u.busId||"-"}</span></td>
                    <td class="small">${u.city||"-"}</td>
                    <td class="small">${u.branch||"-"}</td>
                    <td class="small">${yearLabel}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${u.role||'student'}','${u.id}','${(u.name||'').replace(/'/g,"\\'")}')"><i class="bi bi-trash3"></i></button></td>
                </tr>`;
            }).join("");
        }

        function updateChips() {
            const chips = [];
            const role = document.getElementById("roleFilter").value;
            const bus = document.getElementById("busFilter").value;
            const city = document.getElementById("cityFilter").value;
            const branch = document.getElementById("branchFilter").value;
            const year = document.getElementById("yearFilter").value;
            if (role !== "all") chips.push({ label: role, clear: () => { document.getElementById("roleFilter").value = "all"; renderTable(); } });
            if (bus !== "all") chips.push({ label: bus, clear: () => { document.getElementById("busFilter").value = "all"; renderTable(); } });
            if (city !== "all") chips.push({ label: city, clear: () => { document.getElementById("cityFilter").value = "all"; renderTable(); } });
            if (branch !== "all") chips.push({ label: branch, clear: () => { document.getElementById("branchFilter").value = "all"; renderTable(); } });
            if (year !== "all") chips.push({ label: YEAR_LABELS[year] || year, clear: () => { document.getElementById("yearFilter").value = "all"; renderTable(); } });
            const el = document.getElementById("filterChips");
            if (!chips.length) { el.innerHTML = ""; return; }
            el.innerHTML = chips.map((c, i) => `<span class="filter-chip" onclick="document.querySelectorAll('.filter-chip')[${i}].__clear()">${c.label} <i class="bi bi-x"></i></span>`).join(" ");
            el.querySelectorAll(".filter-chip").forEach((chip, i) => chip.__clear = chips[i].clear);
        }

        async function deleteUser(role, id, name) {
            if (!confirm(`Are you sure you want to delete "${name}"?\n\nThis will permanently remove the user and all associated data.`)) return;
            const type = role === "faculty" ? "faculty" : "student";
            try {
                const res = await fetch(`${API}/admin/delete-user/${type}/${id}`, { method: "DELETE", headers: headers() });
                const data = await res.json();
                if (data.success) {
                    showToast("User deleted", "success");
                    allUsers = allUsers.filter(u => u.id !== id);
                    populateFilters();
                    renderTable();
                } else { alert(data.error || "Delete failed"); }
            } catch (e) { alert("Network error"); }
        }

        loadUsers();
    </script>
</body>
</html>
