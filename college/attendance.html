<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admin - Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <style>
        .report-chip{display:inline-block;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;transition:.2s;margin-right:6px}
        .report-chip.active{background:#2563eb;color:#fff;border-color:#2563eb}
        .report-chip:hover:not(.active){background:#f1f5f9}
        .badge-present{background:#dcfce7;color:#166534}
        .badge-absent{background:#fee2e2;color:#991b1b}
        .badge-exit{background:#fef3c7;color:#92400e}
    </style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-mortarboard me-2"></i>College Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item"><i class="bi bi-people"></i>Users</div></a>
        <a href="attendance.html"><div class="nav-item active"><i class="bi bi-check2-square"></i>Attendance</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="complaints.html"><div class="nav-item"><i class="bi bi-chat-dots"></i>Complaints</div></a>
        <a href="reports.html"><div class="nav-item"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <!-- Topbar -->
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <div><h5 class="fw-bold mb-0">Attendance Management</h5><small class="text-muted">College Bus Attendance Records</small></div>
            <span class="badge bg-primary admin-box px-3 py-2">College Admin</span>
        </div>

        <!-- Stats Cards -->
        <div class="row g-3 mb-3" id="attStats"></div>

        <!-- Report Type + Date Selection -->
        <div class="section-box">
            <div class="row g-2 align-items-center">
                <div class="col-md-5">
                    <label class="form-label small fw-medium mb-1">Report Type</label><br>
                    <span class="report-chip active" id="chipDaily" onclick="setReportType('daily')">Daily</span>
                    <span class="report-chip" id="chipWeekly" onclick="setReportType('weekly')">Weekly</span>
                    <span class="report-chip" id="chipMonthly" onclick="setReportType('monthly')">Monthly</span>
                </div>
                <div class="col-md-3" id="datePickerWrap">
                    <label class="form-label small fw-medium mb-1">Select Date</label>
                    <input type="date" id="dateFilter" class="form-control form-control-sm" onchange="loadAttendance()">
                </div>
                <div class="col-md-2" id="weekPickerWrap" style="display:none">
                    <label class="form-label small fw-medium mb-1">Select Week</label>
                    <input type="week" id="weekFilter" class="form-control form-control-sm" onchange="loadAttendance()">
                </div>
                <div class="col-md-2" id="monthPickerWrap" style="display:none">
                    <label class="form-label small fw-medium mb-1">Select Month</label>
                    <input type="month" id="monthFilter" class="form-control form-control-sm" onchange="loadAttendance()">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary btn-sm w-100" onclick="loadAttendance()"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="section-box">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-medium mb-1">Search Student</label>
                    <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Name or ID..." oninput="applyFilters()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">Bus</label>
                    <select id="busFilter" class="form-select form-select-sm" onchange="onBusFilterChange()">
                        <option value="all">All Buses</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">City</label>
                    <select id="cityFilter" class="form-select form-select-sm" onchange="applyFilters()">
                        <option value="all">All Cities</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">Branch</label>
                    <select id="branchFilter" class="form-select form-select-sm" onchange="applyFilters()">
                        <option value="all">All Branches</option>
                        <option value="Civil">Civil</option>
                        <option value="Mechanical">Mechanical</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Mining">Mining</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">Academic Year</label>
                    <select id="yearFilter" class="form-select form-select-sm" onchange="applyFilters()">
                        <option value="all">All Years</option>
                        <option value="1">First Year</option>
                        <option value="2">Second Year</option>
                        <option value="3">Third Year</option>
                        <option value="4">Fourth Year</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <span class="badge bg-secondary w-100 py-2 small" id="recordCount">-</span>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="section-box">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Student Name</th>
                            <th>Branch</th>
                            <th>Year</th>
                            <th>Bus</th>
                            <th>City</th>
                            <th>Boarding Time</th>
                            <th>Arrival Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("college")) throw "unauthorized";

        const BUSES = ["BUS-2","BUS-3","BUS-7","BUS-9","BUS-10","BUS-11","BUS-12","BUS-13","BUS-14","BUS-15"];
        let allRecords = [];
        let allStudents = {}; // studentId → student doc (for city, branch, year lookups)
        let routesData = []; // route data for city lookups
        let reportType = "daily";

        // Init date pickers
        document.getElementById("dateFilter").value = new Date().toISOString().split("T")[0];
        const now = new Date();
        document.getElementById("weekFilter").value = `${now.getFullYear()}-W${String(getWeekNumber(now)).padStart(2,'0')}`;
        document.getElementById("monthFilter").value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

        // Populate bus filter
        document.getElementById("busFilter").innerHTML = '<option value="all">All Buses</option>' + BUSES.map(b => `<option value="${b}">${b}</option>`).join("");

        function getWeekNumber(d) {
            const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            const dayNum = date.getUTCDay() || 7;
            date.setUTCDate(date.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        }

        // ── Report Type Switching ────────────────────────────────────
        function setReportType(type) {
            reportType = type;
            document.getElementById("chipDaily").className = type === "daily" ? "report-chip active" : "report-chip";
            document.getElementById("chipWeekly").className = type === "weekly" ? "report-chip active" : "report-chip";
            document.getElementById("chipMonthly").className = type === "monthly" ? "report-chip active" : "report-chip";
            document.getElementById("datePickerWrap").style.display = type === "daily" ? "block" : "none";
            document.getElementById("weekPickerWrap").style.display = type === "weekly" ? "block" : "none";
            document.getElementById("monthPickerWrap").style.display = type === "monthly" ? "block" : "none";
            loadAttendance();
        }

        // ── Load Students (for city/branch/year data) ────────────────
        async function loadStudents() {
            try {
                const res = await fetch(`${API}/admin/users-by-institution?institution=college`, { headers: headers() });
                const data = await res.json();
                if (data.success) {
                    (data.students || []).forEach(s => { allStudents[s.id] = s; });
                }
            } catch (e) { console.error("Load students error:", e); }
        }

        // ── Load Routes (for city dropdown) ──────────────────────────
        async function loadRoutes() {
            try {
                const res = await fetch(`${API}/admin/routes-by-institution?institution=college`, { headers: headers() });
                const data = await res.json();
                if (data.success) routesData = data.routes || [];
            } catch (e) { console.error("Load routes error:", e); }
        }

        // ── Bus filter change → populate city dropdown ───────────────
        function onBusFilterChange() {
            const busId = document.getElementById("busFilter").value;
            const citySelect = document.getElementById("cityFilter");
            citySelect.innerHTML = '<option value="all">All Cities</option>';
            if (busId !== "all") {
                const route = routesData.find(r => r.busId === busId);
                if (route && route.cities) {
                    route.cities.forEach(c => {
                        const name = c.name || c;
                        citySelect.innerHTML += `<option value="${name}">${name}</option>`;
                    });
                }
            }
            applyFilters();
        }

        // ── Get date range based on report type ──────────────────────
        function getDateRange() {
            if (reportType === "daily") {
                const date = document.getElementById("dateFilter").value;
                return { dates: [date], label: date };
            } else if (reportType === "weekly") {
                const weekVal = document.getElementById("weekFilter").value; // "2026-W25"
                const [yr, wk] = weekVal.split("-W").map(Number);
                const dates = [];
                const jan1 = new Date(yr, 0, 1);
                const dayOfWeek = jan1.getDay() || 7;
                const firstMonday = new Date(yr, 0, 1 + (8 - dayOfWeek) % 7);
                const weekStart = new Date(firstMonday.getTime() + (wk - 1) * 7 * 86400000);
                for (let i = 0; i < 7; i++) {
                    const d = new Date(weekStart.getTime() + i * 86400000);
                    dates.push(d.toISOString().split("T")[0]);
                }
                return { dates, label: `Week ${wk}, ${yr}` };
            } else {
                const monthVal = document.getElementById("monthFilter").value; // "2026-06"
                const [yr, mo] = monthVal.split("-").map(Number);
                const daysInMonth = new Date(yr, mo, 0).getDate();
                const dates = [];
                for (let i = 1; i <= daysInMonth; i++) {
                    dates.push(`${yr}-${String(mo).padStart(2,'0')}-${String(i).padStart(2,'0')}`);
                }
                return { dates, label: `${monthVal}` };
            }
        }

        // ── Load Attendance ──────────────────────────────────────────
        async function loadAttendance() {
            const { dates } = getDateRange();
            allRecords = [];

            try {
                // Fetch attendance for each date in range
                const fetches = dates.map(date =>
                    fetch(`${API}/admin/attendance-by-institution?institution=college&date=${date}`, { headers: headers() })
                        .then(r => r.json())
                        .catch(() => ({ success: false }))
                );
                const results = await Promise.all(fetches);

                let totalStudents = 0, boarded = 0, present = 0, exited = 0;
                results.forEach(data => {
                    if (!data.success) return;
                    totalStudents = Math.max(totalStudents, data.totalStudents || 0);
                    boarded += data.boarded || 0;
                    present += data.present || 0;
                    exited += data.exited || 0;
                    (data.records || []).forEach(r => allRecords.push(r));
                });

                // Update stats
                document.getElementById("attStats").innerHTML = `
                    <div class="col-xl-3 col-md-6 col-6"><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#2563eb"><i class="bi bi-people"></i></div><div class="stat-value">${totalStudents}</div><div class="stat-label">Total Students</div></div></div>
                    <div class="col-xl-3 col-md-6 col-6"><div class="stat-card"><div class="stat-icon" style="background:#e0e7ff;color:#4f46e5"><i class="bi bi-bus-front"></i></div><div class="stat-value">${boarded}</div><div class="stat-label">Boarded</div></div></div>
                    <div class="col-xl-3 col-md-6 col-6"><div class="stat-card"><div class="stat-icon" style="background:#dcfce7;color:#16a34a"><i class="bi bi-check-circle"></i></div><div class="stat-value">${present}</div><div class="stat-label">Present</div></div></div>
                    <div class="col-xl-3 col-md-6 col-6"><div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:#d97706"><i class="bi bi-box-arrow-right"></i></div><div class="stat-value">${exited}</div><div class="stat-label">Exited</div></div></div>
                `;

                applyFilters();
            } catch (e) { console.error("Load attendance error:", e); }
        }

        // ── Apply Filters ────────────────────────────────────────────
        function applyFilters() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const busF = document.getElementById("busFilter").value;
            const cityF = document.getElementById("cityFilter").value;
            const branchF = document.getElementById("branchFilter").value;
            const yearF = document.getElementById("yearFilter").value;

            let filtered = allRecords.filter(r => {
                // Get student data for extra fields
                const student = allStudents[r.studentId] || {};
                const studentCity = student.city || "";
                const studentBranch = r.branch || student.branch || "";
                const studentYear = r.academicYear || student.year || "";

                const matchSearch = !search || (r.studentName || "").toLowerCase().includes(search) || (r.studentId || "").toLowerCase().includes(search);
                const matchBus = busF === "all" || r.busId === busF;
                const matchCity = cityF === "all" || studentCity.toLowerCase() === cityF.toLowerCase();
                const matchBranch = branchF === "all" || studentBranch === branchF;
                const matchYear = yearF === "all" || studentYear === yearF;

                return matchSearch && matchBus && matchCity && matchBranch && matchYear;
            });

            document.getElementById("recordCount").innerText = `${filtered.length}`;
            renderTable(filtered);
        }

        // ── Render Table ─────────────────────────────────────────────
        function renderTable(records) {
            const tbody = document.getElementById("attBody");
            if (!records.length) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No attendance records found</td></tr>';
                return;
            }
            tbody.innerHTML = records.map(r => {
                const student = allStudents[r.studentId] || {};
                const city = student.city || "—";
                const branch = r.branch || student.branch || "—";
                const year = r.academicYear || student.year || "—";
                const yearLabel = year === "1" ? "1st" : year === "2" ? "2nd" : year === "3" ? "3rd" : year === "4" ? "4th" : year;

                const bt = r.boardingTime ? new Date(r.boardingTime._seconds ? r.boardingTime._seconds * 1000 : r.boardingTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : "—";
                const at = r.arrivalTime ? new Date(r.arrivalTime._seconds ? r.arrivalTime._seconds * 1000 : r.arrivalTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : "—";

                let statusBadge;
                if (r.exited) {
                    statusBadge = '<span class="badge badge-exit px-2 py-1">Exit</span>';
                } else if (r.present) {
                    statusBadge = '<span class="badge badge-present px-2 py-1">Present</span>';
                } else {
                    statusBadge = '<span class="badge badge-absent px-2 py-1">Absent</span>';
                }

                return `<tr>
                    <td class="fw-semibold">${r.studentName || r.studentId || "—"}</td>
                    <td class="small">${branch}</td>
                    <td class="small">${yearLabel}</td>
                    <td><span class="badge bg-secondary">${r.busId || "—"}</span></td>
                    <td class="small">${city}</td>
                    <td class="small">${bt}</td>
                    <td class="small">${at}</td>
                    <td>${statusBadge}</td>
                </tr>`;
            }).join("");
        }

        // ── Init ─────────────────────────────────────────────────────
        async function initPage() {
            await Promise.all([loadStudents(), loadRoutes()]);
            loadAttendance();
        }
        initPage();
    </script>
</body>
</html>
