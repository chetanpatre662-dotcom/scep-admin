<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Pass Portal — Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f8fafc;--card:#fff;--primary:#4f46e5;--primary-light:#818cf8;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#1e293b;--muted:#94a3b8;--border:#e2e8f0;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,.05)}
        *{font-family:'Inter',system-ui,sans-serif;box-sizing:border-box}
        body{background:var(--bg);margin:0;min-height:100vh;color:var(--text)}
        .page{max-width:1440px;margin:0 auto;padding:20px}
        /* Topbar */
        .topbar{background:var(--card);border-radius:var(--radius);padding:20px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);border:1px solid var(--border)}
        .topbar h4{font-weight:800;margin:0;font-size:20px}
        .topbar p{margin:0;color:var(--muted);font-size:13px}
        .btn-logout{background:none;border:1.5px solid var(--danger);color:var(--danger);padding:8px 16px;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;transition:.2s}
        .btn-logout:hover{background:var(--danger);color:#fff}
        /* Stats */
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:28px}
        .stat{background:var(--card);border-radius:var(--radius);padding:24px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:.2s}
        .stat:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,70,229,.08)}
        .stat-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
        .stat-value{font-size:32px;font-weight:900;line-height:1}
        .stat-label{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
        /* Table Card */
        .table-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
        .table-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center}
        .search-box{position:relative;flex:1;min-width:200px}
        .search-box input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;outline:none;transition:.2s}
        .search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
        .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
        .filter-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;outline:none;background:#fff;min-width:130px;cursor:pointer}
        .filter-select:focus{border-color:var(--primary)}
        /* Table */
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse;min-width:800px}
        thead{position:sticky;top:0;background:var(--bg);z-index:1}
        th{padding:14px 16px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);white-space:nowrap}
        td{padding:14px 16px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
        tr:hover td{background:#fafbfe}
        .name-cell{font-weight:600}
        .roll-cell{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--primary);background:#f1f5f9;padding:3px 8px;border-radius:6px;display:inline-block}
        .bus-badge{background:#f0fdf4;color:#166534;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700}
        /* Status */
        .status{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
        .status-verified{background:#dcfce7;color:#166534}
        .status-pending{background:#fef3c7;color:#92400e}
        .status-expired{background:#fee2e2;color:#991b1b}
        /* Buttons */
        .btn-act{border:none;padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px}
        .btn-act:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
        .btn-act:active{transform:scale(.97)}
        .btn-verify{background:var(--success);color:#fff}
        .btn-renew{background:var(--primary);color:#fff}
        .btn-revoke{background:var(--danger);color:#fff}
        .btn-act:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
        /* Footer */
        .table-footer{padding:14px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
        /* Toast */
        .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
        .toast-msg{padding:14px 20px;border-radius:12px;color:#fff;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);animation:slideIn .3s ease}
        @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        /* Skeleton */
        .skel{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200%;animation:shimmer 1.5s infinite;border-radius:8px;height:16px}
        @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
        /* Responsive */
        @media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.table-header{flex-direction:column}.search-box{min-width:100%}}
        @media(max-width:480px){.stats{grid-template-columns:1fr}.page{padding:12px}}
    </style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <div><h4>🎫 Bus Pass Management</h4><p>Verify, renew, and manage student bus passes</p></div>
        <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Logout</button>
    </div>

    <div class="stats">
        <div class="stat"><div class="stat-icon" style="background:#ede9fe;color:#7c3aed"><i class="bi bi-people-fill"></i></div><div><div class="stat-value" id="sTotal">—</div><div class="stat-label">Total Students</div></div></div>
        <div class="stat"><div class="stat-icon" style="background:#dcfce7;color:#16a34a"><i class="bi bi-patch-check-fill"></i></div><div><div class="stat-value" id="sVerified" style="color:var(--success)">—</div><div class="stat-label">Verified</div></div></div>
        <div class="stat"><div class="stat-icon" style="background:#fef3c7;color:#d97706"><i class="bi bi-hourglass-split"></i></div><div><div class="stat-value" id="sPending" style="color:var(--warning)">—</div><div class="stat-label">Pending</div></div></div>
        <div class="stat"><div class="stat-icon" style="background:#fee2e2;color:#ef4444"><i class="bi bi-x-octagon-fill"></i></div><div><div class="stat-value" id="sExpired" style="color:var(--danger)">—</div><div class="stat-label">Expired</div></div></div>
    </div>

    <div class="table-card">
        <div class="table-header">
            <div class="search-box"><i class="bi bi-search"></i><input type="text" id="fSearch" placeholder="Search name or roll number..." oninput="applyFilter()"></div>
            <select class="filter-select" id="fBranch" onchange="applyFilter()"><option value="">All Branches</option></select>
            <select class="filter-select" id="fYear" onchange="applyFilter()"><option value="">All Years</option></select>
            <select class="filter-select" id="fStatus" onchange="applyFilter()"><option value="">All Status</option><option value="verified">Verified</option><option value="pending">Pending</option><option value="expired">Expired</option></select>
        </div>
        <div class="table-wrap" style="max-height:65vh;overflow-y:auto">
            <table><thead><tr><th>Student</th><th>Roll No</th><th>Branch</th><th>Course</th><th>Year</th><th>Bus</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="8"><div class="skel" style="width:100%;height:20px;margin:8px 0"></div><div class="skel" style="width:85%;height:20px;margin:8px 0"></div><div class="skel" style="width:92%;height:20px;margin:8px 0"></div></td></tr></tbody></table>
        </div>
        <div class="table-footer"><span id="tableInfo">Loading...</span><span id="passInfo"></span></div>
    </div>
</div>
<div class="toast-container" id="toasts"></div>

<script>
const API="http://162.245.191.109:3000";
const token=localStorage.getItem("token");
const role=localStorage.getItem("role");
if(!token||!token.includes(".")||(role!=="bus_pass_admin"&&role!=="payment_admin"&&localStorage.getItem("institution")!=="all")){document.documentElement.style.display="none";localStorage.clear();window.location.replace("../index.html")}
function headers(){return{"Content-Type":"application/json","Authorization":token}}
function logout(){localStorage.clear();window.location.replace("../index.html")}

function toast(msg,type="success"){const c=document.getElementById("toasts");const el=document.createElement("div");el.className="toast-msg";el.style.background=type==="success"?"#10b981":type==="error"?"#ef4444":"#4f46e5";el.innerHTML=`<i class="bi bi-${type==='success'?'check-circle':'x-circle'} me-2"></i>${msg}`;c.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),300)},3000)}

let allStudents=[];

async function load(){
    try{
        const r=await fetch(`${API}/api/bus-pass/students`,{headers:headers()});
        if(r.status===401){logout();return}
        const d=await r.json();
        if(!d.success)return;
        allStudents=d.students||[];
        document.getElementById("sTotal").innerText=d.total;
        document.getElementById("sVerified").innerText=d.verified;
        document.getElementById("sPending").innerText=d.pending;
        document.getElementById("sExpired").innerText=d.expired;
        populateFilters();
        applyFilter();
    }catch(e){console.error(e)}
}

function populateFilters(){
    const branches=[...new Set(allStudents.map(s=>s.branch).filter(Boolean))].sort();
    const years=[...new Set(allStudents.map(s=>s.year).filter(Boolean))].sort();
    document.getElementById("fBranch").innerHTML='<option value="">All Branches</option>'+branches.map(b=>`<option>${b}</option>`).join("");
    document.getElementById("fYear").innerHTML='<option value="">All Years</option>'+years.map(y=>`<option>${y}</option>`).join("");
}

function applyFilter(){
    const q=document.getElementById("fSearch").value.toLowerCase();
    const branch=document.getElementById("fBranch").value;
    const year=document.getElementById("fYear").value;
    const status=document.getElementById("fStatus").value;
    const f=allStudents.filter(s=>{
        if(q&&!(s.name||"").toLowerCase().includes(q)&&!(s.rollNumber||"").toLowerCase().includes(q))return false;
        if(branch&&s.branch!==branch)return false;
        if(year&&s.year!==year)return false;
        if(status&&s.status!==status)return false;
        return true;
    });
    render(f);
    document.getElementById("tableInfo").innerText=`Showing ${f.length} of ${allStudents.length}`;
}

function render(list){
    document.getElementById("tbody").innerHTML=list.map(s=>{
        let badge='';
        if(s.status==="verified")badge='<span class="status status-verified"><i class="bi bi-check-circle-fill"></i>Verified</span>';
        else if(s.status==="expired")badge='<span class="status status-expired"><i class="bi bi-x-circle-fill"></i>Expired</span>';
        else badge='<span class="status status-pending"><i class="bi bi-clock-fill"></i>Pending</span>';
        let actions="";
        if(s.status==="pending")actions=`<button class="btn-act btn-verify" onclick="verify('${s.id}',this)"><i class="bi bi-check-lg"></i>Verify</button>`;
        else if(s.status==="verified")actions=`<button class="btn-act btn-renew me-1" onclick="renew('${s.id}',this)"><i class="bi bi-arrow-repeat"></i>Renew</button><button class="btn-act btn-revoke" onclick="revoke('${s.id}',this)"><i class="bi bi-slash-circle"></i>Revoke</button>`;
        else actions=`<button class="btn-act btn-renew" onclick="renew('${s.id}',this)"><i class="bi bi-arrow-repeat"></i>Renew</button>`;
        return `<tr><td class="name-cell">${s.name||"—"}</td><td><span class="roll-cell">${s.rollNumber||"—"}</span></td><td>${s.branch||"—"}</td><td>${(s.course||"—").toUpperCase()}</td><td>${s.year||"—"}</td><td><span class="bus-badge">${s.busId||"—"}</span></td><td>${badge}</td><td>${actions}</td></tr>`;
    }).join("")||'<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">No students found</td></tr>';
}

async function verify(id,btn){
    btn.disabled=true;btn.innerHTML='<i class="bi bi-arrow-repeat spin"></i>...';
    try{
        const r=await fetch(`${API}/api/bus-pass/verify/${id}`,{method:"POST",headers:headers(),body:JSON.stringify({})});
        const d=await r.json();
        if(d.success){toast(`✅ Verified! Pass: ${d.passId}`);load();}
        else{toast(d.error||"Failed","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-check-lg"></i>Verify'}
    }catch(_){toast("Network error","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-check-lg"></i>Verify'}
}

async function renew(id,btn){
    btn.disabled=true;btn.innerHTML='<i class="bi bi-arrow-repeat spin"></i>...';
    try{
        const r=await fetch(`${API}/api/bus-pass/renew/${id}`,{method:"POST",headers:headers(),body:JSON.stringify({})});
        const d=await r.json();
        if(d.success){toast(`✅ Renewed until ${d.expiry}`);load();}
        else{toast(d.error||"Failed","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-arrow-repeat"></i>Renew'}
    }catch(_){toast("Network error","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-arrow-repeat"></i>Renew'}
}

async function revoke(id,btn){
    btn.disabled=true;btn.innerHTML='<i class="bi bi-arrow-repeat spin"></i>...';
    try{
        const r=await fetch(`${API}/api/bus-pass/revoke/${id}`,{method:"POST",headers:headers(),body:JSON.stringify({})});
        const d=await r.json();
        if(d.success){toast("Pass revoked");load();}
        else{toast(d.error||"Failed","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-slash-circle"></i>Revoke'}
    }catch(_){toast("Network error","error");btn.disabled=false;btn.innerHTML='<i class="bi bi-slash-circle"></i>Revoke'}
}

load();
</script>
</body>
</html>
