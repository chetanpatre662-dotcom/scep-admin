<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCEP Admin - Users</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f1f5f9;
            overflow-x: hidden;
        }

        /* SIDEBAR */

        .sidebar {
            width: 270px;
            height: 100vh;
            position: fixed;
            background: #0f172a;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar a {
            text-decoration: none;
            color: white;
        }

        .sidebar h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 35px;
        }

        .menu-item {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #cbd5e1;
            font-size: 15px;
            font-weight: 500;
        }

        .menu-item:hover,
        .menu-item.active {
            background: #2563eb;
            color: white;
        }

        /* MAIN */

        .main-content {
            margin-left: 270px;
            padding: 25px;
        }

        .topbar {
            background: white;
            border-radius: 18px;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        .topbar h3 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
        }

        .admin-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #eff6ff;
            padding: 10px 18px;
            border-radius: 12px;
            color: #2563eb;
            font-weight: 600;
        }

        /* CARDS */

        .stats-card {
            background: white;
            border-radius: 18px;
            padding: 22px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .stats-card:hover {
            transform: translateY(-4px);
        }

        .stats-icon {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .stats-title {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stats-value {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }

        /* FILTER */

        .filter-box {
            background: white;
            border-radius: 18px;
            padding: 22px;
            margin-top: 25px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
        }

        .form-control,
        .form-select {
            height: 48px;
            border-radius: 12px;
        }

        /* TABS */

        .custom-tabs {
            display: flex;
            gap: 12px;
            margin-top: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            background: white;
            font-weight: 600;
            color: #475569;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #2563eb;
            color: white;
        }

        /* TABLE */

        .table-box {
            background: white;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        table {
            min-width: 1100px;
        }

        thead {
            background: #eff6ff;
        }

        th {
            color: #0f172a;
            font-weight: 600;
            padding: 16px !important;
        }

        td {
            vertical-align: middle;
            padding: 14px !important;
        }

        .badge-custom {
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .student-badge {
            background: #dbeafe;
            color: #2563eb;
        }

        .parent-badge {
            background: #dcfce7;
            color: #15803d;
        }

        .faculty-badge {
            background: #fef3c7;
            color: #b45309;
        }

        .delete-btn {
            border: none;
            background: #ef4444;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 10px;
        }

        .delete-btn:hover {
            background: #dc2626;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-weight: 600;
            color: #64748b;
        }

        /* =========================
   MOBILE SIDEBAR
========================= */


        /* MOBILE */


        .manu {
            display: none;
        }

        /* SIDEBAR */
        .sidebar {
            width: 270px;
            height: 100vh;
            background: #0f172a;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            overflow-y: auto;
            transition: 0.3s ease;
        }

        /* BACKDROP */
        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
            display: none;
        }

        .sidebar-backdrop.active {
            display: block;
        }

        /* MENU BUTTON */
        .menu-bar {
            font-size: 28px;
            display: none;
        }

        /* MOBILE */
        @media(max-width: 991px) {

            .manu {
                display: block !important;
            }

            .menu-bar {
                display: block;
            }

            .sidebar {
                left: -270px;
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                margin-left: 0;
                padding: 0;
            }

            .topbar {
                position: sticky;
                top: 0;
                z-index: 100;
                display: flex;
                justify-content: space-between;
                flex-direction: row;
                gap: 10px;
            }

            .admin-box {
                display: none;
            }

            .main-content {
                padding: 0;
            }

            .filter-box,
            .table-box,
            .custom-tabs,
            .row.g-4 {
                margin-left: 15px;
                margin-right: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- MOBILE MENU BUTTON -->

    <!-- BACKDROP -->
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->

   <div class="sidebar" id="sidebar">

        <h2>
            <i class="bi bi-bus-front"></i>
            SCEP Admin
        </h2>

       <a href="./dashboard.html">
            <div class="menu-item active">
                <i class="bi bi-grid"></i>
                Dashboard
            </div>
        </a>

        <a href="./user.html">
            <div class="menu-item ">
                <i class="bi bi-people"></i>
                Users
            </div>
        </a>

        <a href="./bus.html">
            <div class="menu-item">
                <i class="bi bi-bus-front"></i>
                Bus Monitoring
            </div>
        </a>

        <a href="./attendance.html">
            <div class="menu-item">
                <i class="bi bi-check2-square"></i>
                Attendance
            </div>
        </a>

        <a href="./notification.html">
            <div class="menu-item ">
                <i class="bi bi-check2-square"></i>
               Notification & Complaiants
            </div>
        </a>
             <a href="./route.html">
            <div class="menu-item">
                <i class="bi bi-bell"></i>
                Route
            </div>
        </a>

        <a href="./report.html">
            <div class="menu-item ">
                <i class="bi bi-check2-square"></i>
                Report & Analysis
            </div>
        </a>
       
       

      

    </div>

    <!-- MAIN -->

    <div class="main-content">

        <!-- TOPBAR -->

        <div class="topbar">

            <div class="manu">
                <button class="menu-bar border-0 bg-white" onclick="toggleSidebar()">
                    <i class="bi bi-list fs-4"></i>
                </button>
            </div>

            <div>
                <h3>User Management</h3>
                <small class="text-muted">
                    Manage Students, Parents & Faculty
                </small>
            </div>

            <div class="admin-box">
                <i class="bi bi-person-circle"></i>
                Admin Panel
            </div>

        </div>
        <!-- STATS -->

        <div class="row g-4 text-center">

            <div class="col-xl-3 col-md-6 col-6">
                <div class="stats-card">
                    <div class="stats-icon mx-auto bg-primary-subtle text-primary">
                        <i class="bi bi-people"></i>
                    </div>

                    <div class="stats-title">
                        Total Users
                    </div>

                    <div class="stats-value" id="totalUsers">
                        0
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 col-6">
                <div class="stats-card">
                    <div class="stats-icon mx-auto bg-info-subtle text-info">
                        <i class="bi bi-mortarboard"></i>
                    </div>

                    <div class="stats-title">
                        Students
                    </div>

                    <div class="stats-value" id="totalStudents">
                        0
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 col-6">
                <div class="stats-card">
                    <div class="stats-icon mx-auto bg-success-subtle text-success">
                        <i class="bi bi-person-heart"></i>
                    </div>

                    <div class="stats-title">
                        Parents
                    </div>

                    <div class="stats-value" id="totalParents">
                        0
                    </div>
                </div>
            </div>

            <div class="col-xl-3 col-md-6 col-6">
                <div class="stats-card">
                    <div class="stats-icon mx-auto bg-warning-subtle text-warning">
                        <i class="bi bi-person-workspace"></i>
                    </div>

                    <div class="stats-title">
                        Faculty
                    </div>

                    <div class="stats-value" id="totalFaculty">
                        0
                    </div>
                </div>
            </div>

        </div>

        <!-- FILTER -->

        <div class="filter-box">

            <div class="row g-3">

                <div class="col-md-4">
                    <input type="text" class="form-control" id="searchInput"
                        placeholder="Search user by name or mobile">
                </div>

                <div class="col-md-2">
                    <select class="form-select" id="busFilter">
                        <option value="">All Bus</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select class="form-select" id="branchFilter">
                        <option value="">All Branch</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select class="form-select" id="yearFilter">
                        <option value="">All Year</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select class="form-select" id="typeFilter">
                        <option value="">All Type</option>
                        <option value="student">Student</option>
                        <option value="parent">Parent</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>

            </div>

        </div>

        <!-- TABS -->

        <div class="custom-tabs">

            <button class="tab-btn active" data-type="all">
                ALL
            </button>

            <button class="tab-btn" data-type="student">
                STUDENTS
            </button>

            <button class="tab-btn" data-type="parent">
                PARENTS
            </button>

            <button class="tab-btn" data-type="faculty">
                FACULTY
            </button>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <div class="table-responsive">

                <table class="table align-middle">

                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Mobile</th>
                            <th>Bus</th>
                            <th>Type</th>
                            <th>Branch</th>
                            <th>Year/Class</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="userTable">
                        <tr>
                            <td colspan="7" class="loading">
                                Loading users...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </div>

    </div>

    <script>

        const API = "https://bustracker.satpudaengineeringcollege.com/api";

        let allUsers = [];
        let currentTab = "all";

        async function loadUsers() {

            try {

                const res = await fetch(`${API}/admin/users`);

                const data = await res.json();

                allUsers = data.allUsers || [];

                // totals

                document.getElementById("totalUsers").innerText =
                    data.totalUsers || 0;

                document.getElementById("totalStudents").innerText =
                    data.totalStudents || 0;

                document.getElementById("totalParents").innerText =
                    data.totalParents || 0;

                document.getElementById("totalFaculty").innerText =
                    data.totalFaculty || 0;

                // filters

                fillFilter("busFilter", Object.keys(data.busWise || {}));

                fillFilter("branchFilter", Object.keys(data.branchWise || {}));

                fillFilter("yearFilter", Object.keys(data.yearWise || {}));

                renderUsers();

            } catch (e) {

                console.log(e);

                document.getElementById("userTable").innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-danger">
                            Failed to load users
                        </td>
                    </tr>
                `;
            }
        }

        function fillFilter(id, items) {

            const select = document.getElementById(id);

            items.forEach(item => {

                select.innerHTML += `
                    <option value="${item}">
                        ${item}
                    </option>
                `;
            });
        }

        // =========================
        // MOBILE SIDEBAR
        // =========================





        function renderUsers() {

            const search =
                document.getElementById("searchInput")
                    .value
                    .toLowerCase();

            const bus =
                document.getElementById("busFilter").value;

            const branch =
                document.getElementById("branchFilter").value;

            const year =
                document.getElementById("yearFilter").value;

            const type =
                document.getElementById("typeFilter").value;

            let users = [...allUsers];

            // tab filter

            if (currentTab !== "all") {
                users = users.filter(
                    u => u.userType === currentTab
                );
            }

            // type filter

            if (type) {
                users = users.filter(
                    u => u.userType === type
                );
            }

            // search

            if (search) {

                users = users.filter(u => {

                    const name =
                        (u.name || "").toLowerCase();

                    const mobile =
                        String(u.mobile || "");

                    return (
                        name.includes(search) ||
                        mobile.includes(search)
                    );
                });
            }

            // bus

            if (bus) {
                users = users.filter(
                    u => u.busId === bus
                );
            }

            // branch

            if (branch) {
                users = users.filter(
                    u => u.branch === branch
                );
            }

            // year

            if (year) {
                users = users.filter(
                    u => String(u.year) === year
                );
            }

            const tbody =
                document.getElementById("userTable");

            if (!users.length) {

                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center">
                            No users found
                        </td>
                    </tr>
                `;

                return;
            }

            tbody.innerHTML = users.map(user => {

                let badgeClass = "student-badge";

                if (user.userType === "parent") {
                    badgeClass = "parent-badge";
                }

                if (user.userType === "faculty") {
                    badgeClass = "faculty-badge";
                }

                return `
                    <tr>

                        <td>
                            ${user.name || "N/A"}
                        </td>

                        <td>
                            ${user.mobile || "N/A"}
                        </td>

                        <td>
                            ${user.busId || "-"}
                        </td>

                        <td>
                            <span class="badge-custom ${badgeClass}">
                                ${user.userType}
                            </span>
                        </td>

                        <td>
                            ${user.branch || "-"}
                        </td>

                        <td>
                            ${user.year || user.class || "-"}
                        </td>

                        <td>

                            <button class="delete-btn"
                                onclick="deleteUser(
                                    '${user.id}',
                                    '${user.userType}'
                                )">

                                <i class="bi bi-trash"></i>

                            </button>

                        </td>

                    </tr>
                `;
            }).join("");
        }

        async function deleteUser(id, type) {

            const confirmDelete =
                confirm("Delete this user?");

            if (!confirmDelete) return;

            try {

                const res = await fetch(
                    `${API}/admin/delete-user/${type}/${id}`,
                    {
                        method: "DELETE"
                    }
                );

                const data = await res.json();

                if (data.success) {

                    allUsers =
                        allUsers.filter(
                            u => u.id !== id
                        );

                    renderUsers();

                    alert("User deleted");

                } else {

                    alert(data.error || "Delete failed");
                }

            } catch (e) {

                console.log(e);

                alert("Server error");
            }
        }

        // events

        document
            .getElementById("searchInput")
            .addEventListener("input", renderUsers);

        document
            .getElementById("busFilter")
            .addEventListener("change", renderUsers);

        document
            .getElementById("branchFilter")
            .addEventListener("change", renderUsers);

        document
            .getElementById("yearFilter")
            .addEventListener("change", renderUsers);

        document
            .getElementById("typeFilter")
            .addEventListener("change", renderUsers);

        // tabs

        document
            .querySelectorAll(".tab-btn")
            .forEach(btn => {

                btn.addEventListener("click", () => {

                    document
                        .querySelectorAll(".tab-btn")
                        .forEach(b => b.classList.remove("active"));

                    btn.classList.add("active");

                    currentTab =
                        btn.dataset.type;

                    renderUsers();
                });
            });
        /* TOGGLE SIDEBAR */

        function toggleSidebar() {

            document.getElementById("sidebar")
                .classList.toggle("active");

            document.getElementById("sidebarBackdrop")
                .classList.toggle("active");
        }

        /* AUTO CLOSE SIDEBAR ON MOBILE */

        document.querySelectorAll(".sidebar a")
            .forEach(link => {

                link.addEventListener("click", () => {

                    if (window.innerWidth < 992) {

                        document.getElementById("sidebar")
                            .classList.remove("active");

                        document.getElementById("sidebarBackdrop")
                            .classList.remove("active");
                    }
                });
            });
        loadUsers();

    </script>

</body>

</html>
