<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Complaints & Notifications</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f7fb;
      overflow-x: hidden;
    }

    /* SIDEBAR */

    .sidebar {
      width: 260px;
      height: 100vh;
      background: #0f172a;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 1000;
      overflow-y: auto;
      transition: 0.3s ease;
      padding: 20px;
    }

    .sidebar h2 {
      color: white;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 35px;
    }

    .sidebar a {
      text-decoration: none;
    }

    .menu-item {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #cbd5e1;
      font-size: 15px;
      font-weight: 500;
    }

    .menu-item:hover,
    .menu-item.active {
      background: #2563eb;
      color: white;
    }

    /* MAIN */

    .main-content {
      margin-left: 260px;
      padding: 25px;
    }

    /* TOPBAR */

    .topbar {
      background: white;
      border-radius: 18px;
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
      margin-bottom: 25px;
      position: sticky;
      top: 10px;
      z-index: 100;
    }

    .topbar h3 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    .admin-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #eff6ff;
      padding: 10px 18px;
      border-radius: 12px;
      color: #2563eb;
      font-weight: 600;
    }

    /* SECTION */

    .section-box {
      background: white;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
      margin-bottom: 25px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .section-title h4 {
      font-size: 22px;
      font-weight: 700;
    }

    /* SEARCH */

    .search-box {
      position: relative;
    }

    .search-box i {
      position: absolute;
      top: 14px;
      left: 14px;
      color: gray;
    }

    .search-box input {
      padding-left: 40px;
      border-radius: 12px;
      height: 50px;
    }

    /* COMPLAINT CARD */

    .complaint-card {
      background: #f8fafc;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      border-left: 5px solid #2563eb;
      transition: 0.3s;
    }

    .complaint-card:hover {
      transform: translateY(-3px);
    }

    .complaint-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      flex-wrap: wrap;
      gap: 15px;
    }

    .student-box {
      display: flex;
      gap: 14px;
    }

    .student-avatar {
      width: 55px;
      height: 55px;
      border-radius: 14px;
      background: #dbeafe;
      color: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .complaint-message {
      margin-top: 15px;
      color: #334155;
      line-height: 1.7;
    }

    .badge-status {
      padding: 8px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    .pending {
      background: #dc2626;
    }

    .resolved {
      background: #16a34a;
    }

    /* BUTTONS */

    .btn-custom {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 600;
    }

    .btn-custom:hover {
      background: #1d4ed8;
      color: white;
    }

    .btn-resolve {
      background: #16a34a;
      color: white;
    }

    .btn-delete {
      background: #dc2626;
      color: white;
    }

    /* NOTIFICATION BOX */

    .notification-box {
      background: #eff6ff;
      padding: 22px;
      border-radius: 16px;
    }

    /* MOBILE */

    .menu-bar {
      display: none;
      border: none;
      background: white;
      font-size: 24px;
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 999;
      display: none;
    }

    .sidebar-backdrop.active {
      display: block;
    }

    @media(max-width:991px) {

      .sidebar {
        left: -270px;
      }
      .admin-box{
        display:none
      }

      .sidebar.active {
        left: 0;
      }

      .main-content {
        margin-left: 0;
        padding: 12px;
      }

      .menu-bar {
        display: block;
      }

      .admin-box {
        display: none;
      }

      .topbar {
        padding: 14px 18px;
      }

      .topbar h3 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- BACKDROP -->

  <div class="sidebar-backdrop"
    id="sidebarBackdrop"
    onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->

 <div class="sidebar" id="sidebar">

        <h2>
            <i class="bi bi-bus-front"></i>
            SCEP Admin
        </h2>

       <a href="./dashboard.html">
            <div class="menu-item ">
                <i class="bi bi-grid"></i>
                Dashboard
            </div>
        </a>

        <a href="./user.html">
            <div class="menu-item ">
                <i class="bi bi-people"></i>
                Users
            </div>
        </a>

        <a href="./bus.html">
            <div class="menu-item">
                <i class="bi bi-bus-front"></i>
                Bus Monitoring
            </div>
        </a>

        <a href="./attendance.html">
            <div class="menu-item">
                <i class="bi bi-check2-square"></i>
                Attendance
            </div>
        </a>

        <a href="./notification.html">
            <div class="menu-item  active ">
                <i class="bi bi-check2-square"></i>
               Notification & Complaiants
            </div>
        </a>
             <a href="./route.html">
            <div class="menu-item">
                <i class="bi bi-bell"></i>
                Route
            </div>
        </a>

        <a href="./report.html">
            <div class="menu-item ">
                <i class="bi bi-check2-square"></i>
                Report & Analysis
            </div>
        </a>
       
       

      

    </div>

  <!-- MAIN -->

  <div class="main-content">

    <!-- TOPBAR -->

    <div class="topbar">

      <button class="menu-bar me-2 "
        onclick="toggleSidebar()">
        <i class="fa-solid fa-bars"></i>
      </button>

      <div>
        <h3 class="text-nowrap">Complaints & Notifications</h3>
        <small class="text-muted text-nowrap">
          Manage student complaints & alerts
        </small>
      </div>

      <div class="admin-box">
        <i class="bi bi-person-circle"></i>
        Admin Panel
      </div>

    </div>

    <!-- SEND NOTIFICATION -->

    <div class="section-box">

      <div class="section-title">
        <h4>Send Notification</h4>
      </div>

      <div class="notification-box">

        <div class="row">

          <div class="col-lg-4 mb-3">
            <label class="form-label">Select Bus</label>

            <select class="form-select"
              id="busSelect">

              <option value="ALL">
                All Buses
              </option>

              <option value="BUS-2">
                BUS-2
              </option>

              <option value="BUS-7">
                BUS-7
              </option>

            </select>
          </div>

          <div class="col-lg-4 mb-3">
            <label class="form-label">Title</label>

            <input type="text"
              class="form-control"
              id="notifTitle"
              placeholder="Notification title">
          </div>

          <div class="col-lg-4 mb-3">
            <label class="form-label">Message</label>

            <input type="text"
              class="form-control"
              id="notifMessage"
              placeholder="Write message">
          </div>

        </div>

        <button class="btn btn-custom"
          onclick="sendNotification()">

          <i class="bi bi-send"></i>
          Send Notification

        </button>

      </div>

    </div>

    <!-- COMPLAINTS -->

    <div class="section-box">

      <div class="section-title">

        <h4>Student Complaints</h4>

        <div class="d-flex gap-2">

          <div class="search-box">
            <i class="bi bi-search"></i>

            <input type="text"
              class="form-control"
              id="searchInput"
              placeholder="Search complaint...">
          </div>

          <select class="form-select"
            style="width:180px;"
            id="filterStatus">

            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="resolved">Resolved</option>

          </select>

        </div>

      </div>

      <!-- COMPLAINT LIST -->

      <div id="complaintsContainer">

      </div>

    </div>

  </div>

 <script>

const API_BASE = "http://162.245.191.109:3000";

function toggleSidebar() {

  document.getElementById("sidebar")
    .classList.toggle("active");

  document.getElementById("sidebarBackdrop")
    .classList.toggle("active");
}

/* =========================
   LOAD BUSES FROM REAL API
========================= */

async function loadBuses() {

  try {

    const res = await fetch(
      `${API_BASE}/admin/dashboard`
    );

    const data = await res.json();

    const busSelect =
      document.getElementById("busSelect");

    // reset
    busSelect.innerHTML = `
      <option value="ALL">
        All Buses
      </option>
    `;

    // unique buses
    const buses = [...new Set(
      (data.buses || []).map(b => b.busId)
    )];

    buses.forEach(busId => {

      busSelect.innerHTML += `
        <option value="${busId}">
          ${busId}
        </option>
      `;
    });

    console.log("✅ Buses Loaded:", buses);

  } catch (e) {

    console.log("BUS LOAD ERROR:", e);
  }
}

/* =========================
   LOAD COMPLAINTS
========================= */

async function loadComplaints() {

  try {

    const res = await fetch(
      `${API_BASE}/admin/complaint`
    );

    const result = await res.json();

    renderComplaints(result.complaints || []);

  } catch (e) {

    console.log("COMPLAINT LOAD ERROR:", e);
  }
}

/* =========================
   RENDER COMPLAINTS
========================= */

function renderComplaints(data) {

  const container =
    document.getElementById("complaintsContainer");

  container.innerHTML = "";

  if (!data.length) {

    container.innerHTML = `
      <div class="alert alert-info">
        No complaints found
      </div>
    `;

    return;
  }

  data.forEach(item => {

    container.innerHTML += `

    <div class="complaint-card">

      <div class="complaint-header">

        <div class="student-box">

          <div class="student-avatar">
            <i class="bi bi-person"></i>
          </div>

          <div>

            <h5 class="mb-1">
              ${item.name || "Unknown"}
            </h5>

        <div class="text-muted small">
  🚌 Bus: ${item.busId || "N/A"}
</div>

<div class="text-muted small">
  🎓 Branch: ${item.branch || "N/A"}
</div>

<div class="text-muted small">
  📅 Year: ${item.year || "N/A"}
</div>





<div class="text-muted small">
  👤 User Type: ${item.userType || "N/A"}
</div>

<div class="text-muted small">
  📧 Email: ${item.email || "N/A"}
</div>

<div class="text-muted small">
  📱 Mobile: ${item.mobile || "N/A"}
</div>





<div class="text-muted small">
  🕒 ${formatDate(item.createdAt)}
</div>
          </div>

        </div>

        <div>

          <span class="badge-status ${item.status}">
            ${item.status}
          </span>

        </div>

      </div>

      <div class="mt-3">
        <strong>${item.subject}</strong>
      </div>

      <div class="complaint-message">
        ${item.complaint}
      </div>

      <div class="d-flex gap-2 mt-4 flex-wrap">

        ${
          item.status !== "resolved"
          ? `
          <button class="btn btn-resolve"
            onclick="resolveComplaint('${item.id}')">

            <i class="bi bi-check-circle"></i>
            Mark Resolved

          </button>
          `
          : ""
        }

        <button class="btn btn-delete"
          onclick="deleteComplaint('${item.id}')">

          <i class="bi bi-trash"></i>
          Delete

        </button>

      </div>

    </div>

    `;
  });
}

/* =========================
   SEND NOTIFICATION
========================= */

async function sendNotification() {

  const busId =
    document.getElementById("busSelect").value;

  const title =
    document.getElementById("notifTitle").value;

  const message =
    document.getElementById("notifMessage").value;

  if (!title || !message) {

    alert("Fill all fields");
    return;
  }

  try {

    const res = await fetch(
      `${API_BASE}/admin/send-notification`,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          busId,
          title,
          message
        })
      }
    );

    const data = await res.json();

    if (data.success) {

      alert(
        `✅ Notification sent to ${data.sent} users`
      );

      document.getElementById("notifTitle").value = "";
      document.getElementById("notifMessage").value = "";

    } else {

      alert(data.message || "Failed");
    }

  } catch (e) {

    console.log(e);

    alert("Notification Failed");
  }
}

function formatDate(timestamp) {
  if (!timestamp) return "N/A";

  try {

    // Firestore Timestamp
    if (timestamp.seconds) {
      return new Date(timestamp.seconds * 1000).toLocaleString();
    }

    // Firestore ISO string OR normal string
    if (typeof timestamp === "string") {
      const d = new Date(timestamp);
      return isNaN(d.getTime()) ? "N/A" : d.toLocaleString();
    }

    // JS Date object
    if (timestamp instanceof Date) {
      return timestamp.toLocaleString();
    }

    // fallback
    const d = new Date(timestamp);
    return isNaN(d.getTime()) ? "N/A" : d.toLocaleString();

  } catch (e) {
    return "N/A";
  }
}
/* =========================
   RESOLVE COMPLAINT
========================= */

async function resolveComplaint(id) {

  try {

    const res = await fetch(
      `${API_BASE}/admin/complaint-status/${id}`,
      {
        method: "PATCH",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          status: "resolved"
        })
      }
    );

    const data = await res.json();

    if (data.success) {

      alert("✅ Complaint Resolved");

      loadComplaints();
    }

  } catch (e) {

    console.log(e);
  }
}

/* =========================
   DELETE COMPLAINT
========================= */

async function deleteComplaint(id) {

  if (!confirm("Delete complaint ?"))
    return;

  try {

    const res = await fetch(
      `${API_BASE}/admin/complaint/${id}`,
      {
        method: "DELETE"
      }
    );

    const data = await res.json();

    if (data.success) {

      alert("✅ Complaint Deleted");

      loadComplaints();
    }

  } catch (e) {

    console.log(e);
  }
}

/* =========================
   SEARCH + FILTER
========================= */

document.getElementById("searchInput")
.addEventListener("input", filterComplaints);

document.getElementById("filterStatus")
.addEventListener("change", filterComplaints);

function filterComplaints() {

  const search =
    document.getElementById("searchInput")
    .value.toLowerCase();

  const status =
    document.getElementById("filterStatus")
    .value;

  const cards =
    document.querySelectorAll(".complaint-card");

  cards.forEach(card => {

    const text =
      card.innerText.toLowerCase();

    const badge =
      card.querySelector(".badge-status")
      ?.innerText.toLowerCase();

    const matchSearch =
      text.includes(search);

    const matchStatus =
      status === "all" || badge === status;

    card.style.display =
      matchSearch && matchStatus
      ? "block"
      : "none";
  });
}

/* =========================
   INITIAL LOAD
========================= */

loadBuses();

loadComplaints();

setInterval(loadComplaints, 30000);

</script>

</body>

</html>
