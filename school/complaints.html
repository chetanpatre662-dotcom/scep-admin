<!DOCTYPE html>
<html lang="en">
<head>
    <script>if(!localStorage.getItem("token")||localStorage.getItem("token").split(".").length!==3){document.documentElement.style.display="none";localStorage.clear();window.location.replace("../index.html")}</script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admin - Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <style>
        .complaint-card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-bottom: 16px; transition: .2s; }
        .complaint-card:hover { box-shadow: 0 4px 16px rgba(14,165,233,.08); }
        .complaint-status-pending { background: #fef3c7; color: #92400e; }
        .complaint-status-resolved { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-book me-2"></i>School Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item"><i class="bi bi-people"></i>Users</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="complaints.html"><div class="nav-item active"><i class="bi bi-chat-dots"></i>Complaints</div></a>
        <a href="reports.html"><div class="nav-item"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <div><h5 class="fw-bold mb-0">Complaints</h5><small class="text-muted">Parents & School Faculty Complaints</small></div>
            <span class="badge bg-warning text-dark px-3 py-2" id="compCount">Loading...</span>
        </div>

        <!-- Filter -->
        <div class="section-box">
            <div class="row g-2 align-items-center">
                <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="searchInput" placeholder="Search by name, complaint..." oninput="renderComplaints()"></div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" id="statusFilter" onchange="renderComplaints()">
                        <option value="all">All Status</option><option value="pending">Pending</option><option value="resolved">Resolved</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select form-select-sm" id="roleFilter" onchange="renderComplaints()">
                        <option value="all">All Roles</option><option value="parent">Parent</option><option value="faculty">Faculty</option>
                    </select>
                </div>
                <div class="col-md-2"><span class="badge bg-info w-100 py-2" id="filteredCount">-</span></div>
            </div>
        </div>

        <!-- Complaints List -->
        <div id="complaintsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("school")) throw "unauthorized";

        // SCHOOL: Only show parents and faculty (NOT students, NOT college users)
        const ALLOWED_ROLES = ["parent", "faculty"];
        let allComplaints = [];

        async function loadComplaints() {
            try {
                const res = await fetch(`${API}/admin/complaints-by-institution?institution=school`, { headers: headers() });
                const data = await res.json();
                if (!data.success) return;
                // Strict filter: only parent and faculty roles
                allComplaints = (data.complaints || []).filter(c => {
                    const role = (c.role || "").toLowerCase();
                    return ALLOWED_ROLES.includes(role);
                });
                document.getElementById("compCount").innerText = `${allComplaints.length} complaints`;
                renderComplaints();
            } catch (e) { console.error(e); }
        }

        function renderComplaints() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const statusF = document.getElementById("statusFilter").value;
            const roleF = document.getElementById("roleFilter").value;

            let filtered = allComplaints.filter(c => {
                const matchSearch = (c.name || "").toLowerCase().includes(search) || (c.complaint || "").toLowerCase().includes(search);
                const matchStatus = statusF === "all" || (c.status || "pending") === statusF;
                const matchRole = roleF === "all" || (c.role || "").toLowerCase() === roleF;
                return matchSearch && matchStatus && matchRole;
            });

            document.getElementById("filteredCount").innerText = `${filtered.length} shown`;
            const container = document.getElementById("complaintsContainer");

            if (!filtered.length) {
                container.innerHTML = '<div class="text-center text-muted py-5">No complaints found</div>';
                return;
            }

            container.innerHTML = filtered.map(c => {
                const date = c.createdAt ? new Date(c.createdAt._seconds ? c.createdAt._seconds * 1000 : c.createdAt).toLocaleString() : "—";
                const statusClass = (c.status || "pending") === "resolved" ? "complaint-status-resolved" : "complaint-status-pending";
                const statusText = (c.status || "pending");
                const isResolved = statusText === "resolved";
                return `<div class="complaint-card">
                    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                        <div>
                            <div class="fw-bold">${c.name || "Unknown"}</div>
                            <div class="text-muted small"><i class="bi bi-phone me-1"></i>${c.mobile || "N/A"} · <span class="badge bg-secondary">${(c.role || "—").charAt(0).toUpperCase() + (c.role || "").slice(1)}</span> · <i class="bi bi-bus-front-fill me-1"></i>${c.busId || "—"}</div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge ${statusClass} px-2 py-1">${statusText}</span>
                            <span class="text-muted small">${date}</span>
                        </div>
                    </div>
                    <div class="mt-2 small" style="color:#334155">${c.complaint || "No description"}</div>
                    <div class="mt-3 d-flex gap-2 justify-content-end">
                        ${!isResolved ? `<button class="btn btn-sm btn-success" onclick="resolveComplaint('${c.id}')"><i class="bi bi-check-lg me-1"></i>Resolve</button>` : ''}
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteComplaint('${c.id}')"><i class="bi bi-trash me-1"></i>Delete</button>
                    </div>
                </div>`;
            }).join("");
        }

        async function resolveComplaint(id) {
            try {
                const res = await fetch(`${API}/admin/complaint-status/${id}`, { method: "PATCH", headers: headers(), body: JSON.stringify({ status: "resolved" }) });
                const data = await res.json();
                if (data.success) { showToast("✅ Complaint resolved", "success"); loadComplaints(); }
                else { alert(data.error || "Failed"); }
            } catch (e) { alert("Network error"); }
        }

        async function deleteComplaint(id) {
            if (!confirm("Are you sure you want to delete this complaint?")) return;
            try {
                const res = await fetch(`${API}/admin/complaint/${id}`, { method: "DELETE", headers: headers() });
                const data = await res.json();
                if (data.success) { showToast("🗑️ Complaint deleted", "info"); loadComplaints(); }
                else { alert(data.error || "Failed"); }
            } catch (e) { alert("Network error"); }
        }

        loadComplaints();
    </script>
</body>
</html>
