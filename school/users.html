<!DOCTYPE html>
<html lang="en">
<head>
    <script>if(!localStorage.getItem("token")||localStorage.getItem("token").split(".").length!==3){document.documentElement.style.display="none";localStorage.clear();window.location.replace("../index.html")}</script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admin - Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <style>
        :root { --primary:#0284C7; --primary-light:#0EA5E9; --secondary:#06B6D4; --accent:#22C55E; --gradient-main:linear-gradient(135deg,#0284C7,#06B6D4); --gradient-accent:linear-gradient(135deg,#22C55E,#0284C7); --shadow-glow:0 4px 20px rgba(2,132,199,.15); }
        .filter-bar { position:sticky; top:0; z-index:10; background:#fff; border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:0 4px 16px rgba(0,0,0,.04); }
    </style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-book me-2"></i>School Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item active"><i class="bi bi-people"></i>Users</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="support.html"><div class="nav-item"><i class="bi bi-headset"></i>Support</div></a>
        <a href="reports.html"><div class="nav-item"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <div><h5 class="fw-bold mb-0">Users Management</h5><small class="text-muted">Parents & Faculty</small></div>
            <span class="badge bg-info px-3 py-2 admin-box">School Admin</span>
        </div>

        <!-- Advanced Filter Bar -->
        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label small fw-medium mb-1">Search</label>
                    <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="Name or mobile..." oninput="debounceRender()">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">Role</label>
                    <select id="roleFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Roles</option>
                        <option value="parent">Parents</option>
                        <option value="faculty">Faculty</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">Bus</label>
                    <select id="busFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Buses</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-medium mb-1">City</label>
                    <select id="cityFilter" class="form-select form-select-sm" onchange="renderTable()">
                        <option value="all">All Cities</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="clearFilters()"><i class="bi bi-x-circle me-1"></i>Clear</button>
                </div>
                <div class="col-md-1">
                    <span class="badge bg-secondary w-100 py-2" id="countLabel">-</span>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="section-box">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Name</th><th>Role</th><th>Mobile</th><th>Bus</th><th>City</th><th>Actions</th></tr></thead>
                    <tbody id="usersBody"><tr><td colspan="6" class="text-center text-muted py-4"><div class="skeleton-line mb-2"></div><div class="skeleton-line"></div></td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("school")) throw "unauthorized";

        let allUsers = [];
        let _debounceTimer = null;

        function debounceRender() {
            clearTimeout(_debounceTimer);
            _debounceTimer = setTimeout(renderTable, 250);
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API}/admin/users-by-institution?institution=school`, { headers: headers() });
                const data = await res.json();
                if (data.success) {
                    // STRICT: only parents and faculty (NO students, NO college data)
                    allUsers = [...(data.faculty || []), ...(data.parents || [])];
                    populateFilters();
                    renderTable();
                }
            } catch (e) { console.error("Load users error:", e); }
        }

        function populateFilters() {
            // Bus filter
            const buses = [...new Set(allUsers.map(u => u.busId).filter(Boolean))].sort((a,b) => {
                const nA = parseInt(a.replace(/\D/g,'')) || 0;
                const nB = parseInt(b.replace(/\D/g,'')) || 0;
                return nA - nB;
            });
            document.getElementById("busFilter").innerHTML = '<option value="all">All Buses</option>' + buses.map(b => `<option value="${b}">${b}</option>`).join("");

            // City filter
            const cities = [...new Set(allUsers.map(u => u.city).filter(Boolean))].sort();
            document.getElementById("cityFilter").innerHTML = '<option value="all">All Cities</option>' + cities.map(c => `<option value="${c}">${c}</option>`).join("");
        }

        function clearFilters() {
            document.getElementById("searchBox").value = "";
            document.getElementById("roleFilter").value = "all";
            document.getElementById("busFilter").value = "all";
            document.getElementById("cityFilter").value = "all";
            renderTable();
        }

        function renderTable() {
            const search = document.getElementById("searchBox").value.toLowerCase();
            const role = document.getElementById("roleFilter").value;
            const bus = document.getElementById("busFilter").value;
            const city = document.getElementById("cityFilter").value;

            let filtered = allUsers.filter(u => {
                const matchSearch = !search || (u.name||"").toLowerCase().includes(search) || (u.mobile||"").includes(search);
                const matchRole = role === "all" || (u.role||"").toLowerCase() === role;
                const matchBus = bus === "all" || u.busId === bus;
                const matchCity = city === "all" || (u.city||"").toLowerCase() === city.toLowerCase();
                return matchSearch && matchRole && matchBus && matchCity;
            });

            document.getElementById("countLabel").innerText = filtered.length;

            if (!filtered.length) {
                document.getElementById("usersBody").innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No users match filters</td></tr>';
                return;
            }

            document.getElementById("usersBody").innerHTML = filtered.map(u => `
                <tr>
                    <td class="fw-semibold">${u.name||"-"}</td>
                    <td><span class="badge ${u.role==='faculty'?'bg-warning text-dark':'bg-info'}">${(u.role||"-").charAt(0).toUpperCase()+(u.role||"").slice(1)}</span></td>
                    <td class="small">${u.mobile||"-"}</td>
                    <td><span class="badge bg-secondary">${u.busId||"-"}</span></td>
                    <td class="small">${u.city||"-"}</td>
                    <td><button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${u.role||'parent'}','${u.id}','${(u.name||'').replace(/'/g,"\\'")}')"><i class="bi bi-trash"></i></button></td>
                </tr>
            `).join("");
        }

        async function deleteUser(role, id, name) {
            if (!confirm(`Are you sure you want to delete this user?\n\n"${name}"\n\nThis will permanently remove the user and all associated data.`)) return;
            const type = role === "faculty" ? "faculty" : "parent";
            try {
                const res = await fetch(`${API}/admin/delete-user/${type}/${id}`, { method: "DELETE", headers: headers() });
                const data = await res.json();
                if (data.success) {
                    showToast("🗑️ User deleted", "success");
                    allUsers = allUsers.filter(u => u.id !== id);
                    populateFilters();
                    renderTable();
                } else { alert(data.error || "Delete failed"); }
            } catch (e) { alert("Network error"); }
        }

        loadUsers();
    </script>
</body>
</html>
