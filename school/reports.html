<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admin - Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>:root{--primary:#0284C7;--secondary:#06B6D4;--accent:#22C55E;--gradient-main:linear-gradient(135deg,#0284C7,#06B6D4);--shadow-glow:0 4px 20px rgba(2,132,199,.15)}</style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-book me-2"></i>School Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item"><i class="bi bi-people"></i>Users</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="complaints.html"><div class="nav-item"><i class="bi bi-chat-dots"></i>Complaints</div></a>
        <a href="reports.html"><div class="nav-item active"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <h5 class="fw-bold mb-0">Transport Reports</h5>
            <span class="badge bg-info px-3 py-2 admin-box">School Admin</span>
        </div>

        <!-- Stats Summary -->
        <div class="row g-3" id="summaryCards"></div>

        <!-- Charts -->
        <div class="row mt-3">
            <div class="col-lg-6">
                <div class="section-box">
                    <h6 class="fw-bold mb-3">User Distribution</h6>
                    <canvas id="userChart" height="200"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="section-box">
                    <h6 class="fw-bold mb-3">Bus-wise Users</h6>
                    <canvas id="busChart" height="200"></canvas>
                </div>
            </div>
        </div>

        <!-- Route Summary -->
        <div class="section-box mt-3">
            <h6 class="fw-bold mb-3">Active Routes</h6>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Route Name</th><th>Bus</th><th>Stops</th><th>Status</th></tr></thead>
                    <tbody id="routeBody"><tr><td colspan="4" class="text-center text-muted">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("school")) throw "unauthorized";

        let userChartInst, busChartInst;
        async function loadReports() {
            try {
                const [usersRes, routesRes] = await Promise.all([
                    fetchWithCache(`${API}/admin/users-by-institution?institution=school`, "rpt_users_school"),
                    fetchWithCache(`${API}/admin/routes-by-institution?institution=school`, "rpt_routes_school"),
                ]);

                // Summary cards
                if (usersRes.success) {
                    document.getElementById("summaryCards").innerHTML = `
                        <div class="col-md-3 col-6"><div class="stat-card"><div class="stat-value">${usersRes.counts?.total || 0}</div><div class="stat-label">Total Users</div></div></div>
                        <div class="col-md-3 col-6"><div class="stat-card"><div class="stat-value text-primary">${usersRes.counts?.parents || 0}</div><div class="stat-label">Parents</div></div></div>
                        <div class="col-md-3 col-6"><div class="stat-card"><div class="stat-value text-success">${usersRes.counts?.faculty || 0}</div><div class="stat-label">Faculty</div></div></div>
                        <div class="col-md-3 col-6"><div class="stat-card"><div class="stat-value text-info">${routesRes.success ? routesRes.count : 0}</div><div class="stat-label">Active Routes</div></div></div>
                    `;

                    // User distribution chart
                    const ctx = document.getElementById("userChart").getContext("2d");
                    if (userChartInst) userChartInst.destroy();
                    userChartInst = new Chart(ctx, {
                        type: "doughnut",
                        data: { labels: ["Parents","Faculty"], datasets: [{ data: [usersRes.counts?.parents||0, usersRes.counts?.faculty||0], backgroundColor: ["#f59e0b","#16a34a"], borderWidth: 0 }] },
                        options: { responsive: true, plugins: { legend: { position: "bottom" } } }
                    });
                }

                // Bus-wise user distribution
                if (usersRes.success) {
                    const allUsers = [...(usersRes.parents||[]), ...(usersRes.faculty||[])];
                    const busCount = {};
                    allUsers.forEach(u => { if (u.busId) busCount[u.busId] = (busCount[u.busId]||0) + 1; });
                    const labels = Object.keys(busCount).sort();
                    const values = labels.map(k => busCount[k]);
                    const ctx2 = document.getElementById("busChart").getContext("2d");
                    if (busChartInst) busChartInst.destroy();
                    busChartInst = new Chart(ctx2, {
                        type: "bar",
                        data: { labels, datasets: [{ label: "Users", data: values, backgroundColor: "#0ea5e9", borderRadius: 8 }] },
                        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                    });
                }

                // Routes table
                if (routesRes.success) {
                    document.getElementById("routeBody").innerHTML = (routesRes.routes||[]).map(r => {
                        const stops = r.cities ? r.cities.length : 0;
                        return `<tr><td class="fw-semibold">${r.routeName||"—"}</td><td><span class="badge bg-secondary">${r.busId||"—"}</span></td><td>${stops}</td><td><span class="badge bg-success">Active</span></td></tr>`;
                    }).join("") || '<tr><td colspan="4" class="text-center text-muted">No routes</td></tr>';
                }
            } catch (e) { console.error("Report error:", e); }
        }
        loadReports();
    </script>
</body>
</html>
