<!DOCTYPE html>
<html lang="en">
<head>
    <script>if(!localStorage.getItem("token")||localStorage.getItem("token").split(".").length!==3){document.documentElement.style.display="none";localStorage.clear();window.location.replace("../index.html")}</script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admin - Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/admin-styles.css">
    <style>:root{--accent:#06b6d4;--accent-gradient:linear-gradient(135deg,#06b6d4,#3b82f6);--card-glow:rgba(6,182,212,.08)} .chip{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e0e7ff;transition:.2s;margin-right:6px} .chip.active{background:var(--accent-gradient);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(6,182,212,.3)} .chip:hover:not(.active){background:#f0f9ff}</style>
</head>
<body>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <h4><i class="bi bi-book me-2"></i>School Admin</h4>
        <a href="dashboard.html"><div class="nav-item"><i class="bi bi-grid"></i>Dashboard</div></a>
        <a href="users.html"><div class="nav-item"><i class="bi bi-people"></i>Users</div></a>
        <a href="bus.html"><div class="nav-item"><i class="bi bi-bus-front"></i>Bus Monitoring</div></a>
        <a href="routes.html"><div class="nav-item"><i class="bi bi-signpost-split"></i>Routes</div></a>
        <a href="notifications.html"><div class="nav-item active"><i class="bi bi-bell"></i>Notifications</div></a>
        <a href="support.html"><div class="nav-item"><i class="bi bi-headset"></i>Support</div></a>
        <a href="reports.html"><div class="nav-item"><i class="bi bi-bar-chart"></i>Reports</div></a>
        <div class="nav-item mt-4" onclick="logout()" style="color:#f87171;cursor:pointer"><i class="bi bi-box-arrow-left"></i>Logout</div>
    </div>
    <div class="main">
        <div class="topbar">
            <div class="manu"><button class="menu-bar" onclick="toggleSidebar()"><i class="bi bi-list"></i></button></div>
            <h5 class="fw-bold mb-0">Send Notification</h5>
            <span class="badge bg-info px-3 py-2">School Only</span>
        </div>

        <!-- Send Form -->
        <div class="section-box fade-up">
            <div class="alert alert-primary border-0 mb-3 small" style="background:#eff6ff">
                <i class="bi bi-shield-check me-2"></i><strong>Isolation Active:</strong> Notifications reach ONLY school users (Students + Faculty).
            </div>

            <!-- Audience Chips -->
            <div class="mb-3">
                <label class="form-label small fw-medium">Target Audience</label><br>
                <span class="chip active" id="chipAll" onclick="setAudience('ALL')">All Users</span>
                <span class="chip" id="chipBus" onclick="setAudience('BUS')">Specific Bus</span>
            </div>

            <!-- Bus Dropdown (hidden by default) -->
            <div class="mb-3" id="busDropdownWrap" style="display:none">
                <label class="form-label small fw-medium">Select Bus</label>
                <select id="busSelect" class="form-select form-select-sm">
                    <option value="">Choose a bus...</option>
                    <option value="BUS-2">BUS-2</option>
                    <option value="BUS-3">BUS-3</option>
                    <option value="BUS-7">BUS-7</option>
                    <option value="BUS-9">BUS-9</option>
                    <option value="BUS-10">BUS-10</option>
                    <option value="BUS-11">BUS-11</option>
                    <option value="BUS-12">BUS-12</option>
                    <option value="BUS-13">BUS-13</option>
                    <option value="BUS-14">BUS-14</option>
                    <option value="BUS-15">BUS-15</option>
                </select>
            </div>

            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label small fw-medium">Title</label>
                    <input type="text" id="nTitle" class="form-control form-control-sm" placeholder="Notification title">
                </div>
                <div class="col-md-5">
                    <label class="form-label small fw-medium">Message</label>
                    <input type="text" id="nMessage" class="form-control form-control-sm" placeholder="Message body">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary btn-sm w-100" onclick="sendNotif()"><i class="bi bi-send me-1"></i>Send</button>
                </div>
            </div>
            <div id="nResult" class="mt-2 small"></div>
        </div>

        <!-- Sent History -->
        <div class="section-box mt-3">
            <h6 class="fw-bold mb-3">Recent Notifications</h6>
            <div id="notifHistory"><div class="skeleton-line mb-2"></div><div class="skeleton-line mb-2"></div><div class="skeleton-line"></div></div>
        </div>
    </div>

    <script src="../shared/admin-common.js"></script>
    <script>
        if (!verifyInstitution("school")) throw "unauthorized";

        let currentAudience = "ALL";

        function setAudience(type) {
            currentAudience = type;
            document.getElementById("chipAll").className = type === "ALL" ? "chip active" : "chip";
            document.getElementById("chipBus").className = type === "BUS" ? "chip active" : "chip";
            document.getElementById("busDropdownWrap").style.display = type === "BUS" ? "block" : "none";
        }

        async function sendNotif() {
            const title = document.getElementById("nTitle").value.trim();
            const message = document.getElementById("nMessage").value.trim();
            if (!title || !message) { showToast("Fill both title and message", "warning"); return; }

            const busId = currentAudience === "BUS" ? document.getElementById("busSelect").value : null;
            if (currentAudience === "BUS" && !busId) { showToast("Select a bus first", "warning"); return; }

            try {
                // Try the institution-aware endpoint first
                let res = await fetch(`${API}/admin/send-notification-bus`, {
                    method: "POST", headers: headers(),
                    body: JSON.stringify({
                        institution: "school",
                        audienceType: currentAudience,
                        busId: busId,
                        title, message
                    })
                });

                // Fallback: if 404, try the legacy endpoint
                if (res.status === 404) {
                    res = await fetch(`${API}/admin/send-notification`, {
                        method: "POST", headers: headers(),
                        body: JSON.stringify({ busId: busId || "ALL", title, message })
                    });
                }

                const data = await res.json();
                if (data.success) {
                    const target = currentAudience === "BUS" ? `${busId} users` : "all school users";
                    const count = data.successCount || data.sent || 0;
                    showToast(`✅ Sent to ${count} ${target}`, "success");
                    document.getElementById("nResult").innerHTML = `<span class="text-success">✅ Delivered to ${count}/${data.totalUsers || data.total || "?"} users</span>`;
                    document.getElementById("nTitle").value = "";
                    document.getElementById("nMessage").value = "";
                    loadHistory();
                } else {
                    showToast(`❌ ${data.message || data.error}`, "error");
                    document.getElementById("nResult").innerHTML = `<span class="text-danger">❌ ${data.message || data.error || "Failed"}</span>`;
                }
            } catch (e) {
                showToast("Network error", "error");
                document.getElementById("nResult").innerHTML = `<span class="text-danger">❌ Network error</span>`;
            }
        }

        // Notification History
        async function loadHistory() {
            try {
                const res = await fetch(`${API}/admin/notifications-history?institution=school`, { headers: headers() });
                if (res.status === 404) { document.getElementById("notifHistory").innerHTML = '<p class="text-muted small">History not available</p>'; return; }
                const data = await res.json();
                const list = data.notifications || [];
                if (!list.length) { document.getElementById("notifHistory").innerHTML = '<p class="text-muted small">No notifications sent yet</p>'; return; }
                document.getElementById("notifHistory").innerHTML = list.slice(0, 20).map(n => {
                    const date = n.createdAt ? new Date(n.createdAt._seconds ? n.createdAt._seconds * 1000 : n.createdAt).toLocaleString() : "—";
                    const audienceBadge = n.audienceType === "BUS" ? `<span class="badge bg-info">${n.busId}</span>` : '<span class="badge bg-primary">All</span>';
                    return `<div class="d-flex justify-content-between align-items-start border-bottom py-2">
                        <div><div class="fw-semibold small">${n.title || "—"}</div><div class="text-muted" style="font-size:11px">${n.message || ""}</div></div>
                        <div class="text-end">${audienceBadge}<div class="text-muted" style="font-size:10px">${date}</div></div>
                    </div>`;
                }).join("");
            } catch (e) { document.getElementById("notifHistory").innerHTML = '<p class="text-muted small">Failed to load history</p>'; }
        }
        loadHistory();
    </script>
</body>
</html>
